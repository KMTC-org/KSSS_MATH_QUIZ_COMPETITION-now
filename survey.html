<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Welcome — KSSS Maths & Tech Club</title>
  <link rel="icon" type="image/png" href="static/images/Kotu-sss_logo.png">
  <script>
    (function() {
      const key = "ksss-user-theme";
      const saved = localStorage.getItem(key);
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="user/app.css">
</head>
<body>

  <div class="survey-wrap">

    <!-- Survey Header -->
    <div class="survey-header" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
      <div style="display: flex; gap: 18px; margin-bottom: 20px; align-items: center; justify-content: center;">
        <img src="static/images/Kotu-sss_logo.png" alt="KSSS Logo" style="width: 75px; height: 75px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        <img src="static/images/KMTC.webp" alt="KMTC Badge" style="width: 75px; height: 75px; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
      </div>
      <h1 style="font-size: 1.9rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -0.5px;">👋 Welcome to KMTC</h1>
      <p style="color: var(--muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 26px;">
        Before diving into the live mathematics competition, please answer a few quick questions to help us understand our amazing Kotu SSS tech community!
      </p>
      <div class="progress-bar-wrap" style="width: 100%;">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <p class="progress-label" id="progress-label" style="text-align: center; width: 100%; font-weight: 600;">Question 1 of 5</p>
    </div>

    <!-- Survey Form -->
    <div class="survey-body" id="survey-form">
      <div class="question-card">
        <p class="question-number" id="question-number">Question 1</p>
        <p class="question-text"  id="question-text"></p>
        <div class="options-list" id="options-list"></div>
      </div>

      <div class="survey-nav">
        <button class="btn-prev" id="btn-prev" type="button" style="display:none;">← Back</button>
        <button class="btn-next" id="btn-next" type="button" disabled>Next →</button>
      </div>
    </div>

    <!-- Submitting state (hidden until submit) -->
    <div class="survey-body survey-submitting" id="survey-submitting" style="display:none;">
      <div class="spinner"></div>
      <p>Saving your response…</p>
      <p style="margin-top:8px;font-size:0.85rem;color:var(--muted);">You will be redirected shortly.</p>
    </div>

  </div>

  <script src="user/app.js" defer></script>
</body>
</html>
